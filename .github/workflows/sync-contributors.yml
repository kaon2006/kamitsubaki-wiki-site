name: Sync contributors

on:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * *'
  push:
    branches:
      - main
    paths:
      - 'src/content/**'
      - 'scripts/sync-contributors.mjs'
      - '.github/workflows/sync-contributors.yml'

permissions:
  contents: read

jobs:
  sync:
    name: Sync contribution history
    runs-on: ubuntu-latest

    steps:
      - name: Checkout full history
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Checkout backend history
        uses: actions/checkout@v7
        with:
          repository: LinkTh1rsty/kamitsubaki-wiki-site-backend
          path: .contributor-sources/backend
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.1.1

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Sync contributors
        run: |
          if [ -z "$CONTRIBUTOR_SYNC_TOKEN" ]; then
            echo "::error::CONTRIBUTOR_SYNC_TOKEN is not configured in repository Actions secrets."
            exit 1
          fi
          pnpm contributors:sync
        env:
          CONTRIBUTORS_API_BASE: ${{ vars.CONTRIBUTORS_API_BASE || 'https://kamitsubaki-ai-observer.linkth1rstyg.workers.dev' }}
          CONTRIBUTOR_SYNC_TOKEN: ${{ secrets.CONTRIBUTOR_SYNC_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          CONTRIBUTORS_COMMIT_BASE_URL: ${{ vars.CONTRIBUTORS_COMMIT_BASE_URL || format('https://github.com/{0}/commit', github.repository) }}
          CONTRIBUTORS_BACKEND_REPO_PATH: .contributor-sources/backend
          CONTRIBUTORS_BACKEND_GITHUB_REPOSITORY: LinkTh1rsty/kamitsubaki-wiki-site-backend
          CONTRIBUTORS_BACKEND_COMMIT_BASE_URL: https://github.com/LinkTh1rsty/kamitsubaki-wiki-site-backend/commit
